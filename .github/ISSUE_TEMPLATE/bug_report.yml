name: 缺陷报告
description: 报告可以稳定复现的问题
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。请勿在 Issue 中提交密钥或私人信息。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 实际发生了什么？
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境
      description: 浏览器、操作系统和项目提交或版本。
